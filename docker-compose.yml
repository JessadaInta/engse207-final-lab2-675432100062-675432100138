services:

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_secret
    ports:
      - "5433:5432"
    volumes:
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  task-db:
    image: postgres:15
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_secret
    ports:
      - "5434:5432"
    volumes:
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_secret
    ports:
      - "5435:5432"
    volumes:
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql


  auth-service:
    build: ./auth-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://auth_user:auth_secret@auth-db:5432/auth_db
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      - auth-db


  task-service:
    build: ./task-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://task_user:task_secret@task-db:5432/task_db
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      - task-db


  user-service:
    build: ./user-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://user_user:user_secret@user-db:5432/user_db
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      - user-db